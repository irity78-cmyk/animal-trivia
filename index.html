<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Animal Trivia</title>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc,
      getDocs,
      query,
      orderBy
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCQySWQmVl6BmkTdxAmn7Qn0TNjbJ_gojo",
      authDomain: "animal-trivia-6a9dd.firebaseapp.com",
      projectId: "animal-trivia-6a9dd",
      storageBucket: "animal-trivia-6a9dd.firebasestorage.app",
      messagingSenderId: "326519074510",
      appId: "1:326519074510:web:99d20fcc88799070252a9f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const questions = [
      {
        q: "איזו חיה היא מיץ פטל?",
        options: ["ג'ירפה", "אריה", "חתול פרסי", "ארנב"],
        answer: 3
      },
      {
        q: "מהי הציפור הלאומית של מדינת ישראל?",
        options: ["יונה", "נחליאלי", "נשר", "דוכיפת"],
        answer: 3
      },
      {
        q: "מה הוא שמו הפרטי של ד\"ר דוליטל?",
        options: ["ג'ון", "ג'ורג'", "פול", "רינגו"],
        answer: 0
      },
      {
        q: "להקת הביטלס הופיעה בישראל",
        options: ["נכון", "לא נכון"],
        answer: 1
      },
      {
        q: "מי כתב את הספר עזית הכלבה הצנחנית?",
        options: ["אהוד ברק", "מרים ילן שטקליס", "מוטה גור", "סמדר שיר"],
        answer: 2
      },
      {
        q: "מהי הציפור הקטנה ביותר בעולם?",
        options: ["מיינה הודית", "דרור", "תוכי דררה", "יונק הדבש"],
        answer: 3
      },
      {
        q: "כמה עצמות יש לכריש?",
        options: ["10", "0", "32", "11"],
        answer: 1
      },
      {
        q: "באיזו יבשת מתרחש הסרט מדגסקר?",
        options: ["אסיה", "אפריקה", "אוסטרליה", "אנטרקטיקה"],
        answer: 1
      },
      {
        q: "את טרזן גידלו זאבים",
        options: ["נכון", "לא נכון"],
        answer: 1
      },
      {
        q: "בסרט לשחרר את ווילי, החיה שמשחררים היא",
        options: ["כריש", "דולפין", "דג נסיכת הנילוס", "לוויתן"],
        answer: 3
      },
      {
        q: "כמה סניפים יש ברשת חוות דעת?",
        options: ["3", "4", "5", "6"],
        answer: 2
      },
      {
        q: "לאסי היא כלב מסוג גולדן רטריבר",
        options: ["נכון", "לא נכון"],
        answer: 1
      },
      {
        q: "לאיזו חיה הפך הקיסר מהסרט \"הקיסר נפל על הראש\"?",
        options: ["קוף", "זאב", "נחש", "לאמה"],
        answer: 3
      },
      {
        q: "מה שם הדמות בתמונה?",
        options: ["רטטוי", "רמי", "עכברוש", "פיצי"],
        answer: 1
      }
    ];

    let currentQuestion = 0;
    let score = 0;

    window.startQuiz = () => {
      const name = document.getElementById("name").value.trim();
      if (!name) return alert("כתבו שם");

      window.playerName = name;
      document.getElementById("start-screen").style.display = "none";
      showQuestion();
    };

    function showQuestion() {
      const q = questions[currentQuestion];

      document.getElementById("quiz").innerHTML = `
        <h2>שאלה ${currentQuestion + 1} מתוך ${questions.length}</h2>
        <h3>${q.q}</h3>
        ${q.options.map((opt, i) => `
          <button onclick="answerQuestion(${i})">${opt}</button>
        `).join("")}
      `;
    }

    window.answerQuestion = async (index) => {
      if (index === questions[currentQuestion].answer) {
        score += 100;
      }

      currentQuestion++;

      if (currentQuestion >= questions.length) {
        await addDoc(collection(db, "scores"), {
          name: window.playerName,
          score,
          createdAt: new Date()
        });

        showLeaderboard();
        return;
      }

      showQuestion();
    };

    async function showLeaderboard() {
      const q = query(collection(db, "scores"), orderBy("score", "desc"));
      const snapshot = await getDocs(q);

      let html = `<h2>🏆 טבלת מובילים</h2><h3>הניקוד שלך: ${score}</h3>`;

      snapshot.forEach((doc, index) => {
        const data = doc.data();

        html += `
          <p>
            ${index + 1}. ${data.name} - ${data.score}
          </p>
        `;
      });

      document.getElementById("quiz").innerHTML = html;
    }
  </script>

  <style>
    body {
      font-family: Arial, sans-serif;
      direction: rtl;
      text-align: center;
      background: #f5f5f5;
      padding: 30px;
    }

    h1 {
      font-size: 34px;
    }

    h2 {
      color: #333;
    }

    h3 {
      font-size: 24px;
    }

    button {
      display: block;
      margin: 10px auto;
      padding: 15px;
      width: 280px;
      border: none;
      border-radius: 12px;
      background: #4CAF50;
      color: white;
      font-size: 18px;
      cursor: pointer;
    }

    button:hover {
      background: #3e9443;
    }

    input {
      padding: 12px;
      width: 260px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 18px;
      text-align: center;
    }

    p {
      font-size: 20px;
      background: white;
      max-width: 350px;
      margin: 8px auto;
      padding: 10px;
      border-radius: 10px;
    }
  </style>
</head>

<body>
  <div id="start-screen">
    <h1>🐾 Animal Trivia</h1>
    <input id="name" placeholder="השם שלכם"/>
    <br><br>
    <button onclick="startQuiz()">התחל</button>
  </div>

  <div id="quiz"></div>
</body>
</html>
